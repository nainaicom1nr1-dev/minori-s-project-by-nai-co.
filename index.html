<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    /* 1. 外側の宇宙 */
    body {
      background-color: black;
      margin: 0; padding: 0;
      display: flex; justify-content: center; align-items: center;
      height: 100dvh; overflow: hidden;
    }

    /* 2. 16:9の黄金の箱 */
    #game-container {
      width: 100vw; height:100dvh; max-width:calc(100dvh*16/9); max-height:calc(100vw*9/16); aspect-ratio:16/9;
      position: relative;
      background-image: url('huruikami.png');
      background-size: cover; background-position: center;
      overflow: hidden;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      
      /* ★ゲーム画面の横幅を基準にする魔法の単位（100分の1）を登録 */
      container-type: inline-size;
      --u: 1cqw; 
    }

    #mute-btn {
      position: absolute; top: calc(var(--u) * 1.5); left: calc(var(--u) * 1.5); z-index: 1000;
      background: rgba(0, 0, 0, 0.5); color: white;
      border: calc(var(--u) * 0.1) solid #777; border-radius: 50%;
      width: calc(var(--u) * 4); height: calc(var(--u) * 4); cursor: pointer;
      font-size: calc(var(--u) * 1.8); display: flex; justify-content: center; align-items: center;
      transition: 0.3s;
    }

    /* 3. キャラ選択の大きな箱 */
    .ookina-hako {
      display: flex; justify-content: center; align-items: center;
      gap: calc(var(--u) * 3); padding: calc(var(--u) * 2);
      background-color: rgba(0,0,0,0.6); backdrop-filter: blur(calc(var(--u) * 0.4));
      border-radius: calc(var(--u) * 1.5); box-shadow: 0 0 calc(var(--u) * 0.8) rgba(0,0,0,0.8);
      width: 85%; height: 80%;
      box-sizing: border-box;
    }

    /* 左側のメニュー全体 */
    .menyu { 
      flex: 2; 
      height: 100%;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
    }
    
    /* 画像エリア */
    .chara-field {
      position: relative;
      flex: 1;
      width: 100%;
      box-sizing: border-box;
    }
    
    .party-slots { 
      display: flex; flex-direction: column; gap: calc(var(--u) * 0.8); align-items: center; flex: 1;
      justify-content: flex-start;
      padding-top: calc(var(--u) * 1);
    }

    /* 文字サイズも一括連動 */
    h2 { font-size: calc(var(--u) * 2.2); margin: calc(var(--u) * 0.2) 0; color: white; font-family: 'DotGothic16', sans-serif; text-align: center;}
    h3 { font-size: calc(var(--u) * 1.4); margin: 0 0 calc(var(--u) * 0.8) 0; color: #ccc; font-family: 'DotGothic16', sans-serif; text-align: center;}

    /* キャラクター画像 */
    img.gazou { 
      position: absolute;
      width: calc(var(--u) * 9.5); 
      cursor: pointer; 
      transition: 0.2s; 
    }
    img.gazou:hover { transform: scale(1.1); }

    /* ★配置座標を独自の固定単位（--u）で完全ロック */
    /* 1行目 */
    .chara-1  { left: calc(var(--u) * 7);  top: calc(var(--u) * -1); }
    .chara-4  { left: calc(var(--u) * 19); top: calc(var(--u) * -1); }
    .chara-8  { left: calc(var(--u) * 31); top: calc(var(--u) * -1); }
    
    /* 2行目 */
    .chara-2  { left: calc(var(--u) * 7);  top: calc(var(--u) * 8); }
    .chara-3  { left: calc(var(--u) * 19); top: calc(var(--u) * 8); }
    .chara-7  { left: calc(var(--u) * 31); top: calc(var(--u) * 8); }
    
    /* 3行目 */
    .chara-5  { left: calc(var(--u) * 7);  top: calc(var(--u) * 17); }
    .chara-9  { left: calc(var(--u) * 19); top: calc(var(--u) * 17); }
    .chara-11 { left: calc(var(--u) * 31); top: calc(var(--u) * 17); }
    
    /* 4行目 */
    .chara-6  { left: calc(var(--u) * 7);  top: calc(var(--u) * 26); }
    .chara-10 { left: calc(var(--u) * 19); top: calc(var(--u) * 26); }
    .chara-13 { left: calc(var(--u) * 31); top: calc(var(--u) * 26); }

    /* 選択済みキャラ */
    .selected {
      opacity: 0.2 !important;
      pointer-events: none;
      filter: grayscale(80%);
    }

    /* 右側のスロット */
    .slot {
      width: calc(var(--u) * 7.6); height: calc(var(--u) * 7.6);
      border: calc(var(--u) * 0.15) dashed #777;
      display: flex; align-items: center; justify-content: center;
      background-color: rgba(255,255,255,0.05);
    }

    .slot img { opacity: 1!important; animation: none!important; width: auto; height: 90%; }

    #reset-btn {
      margin-top: calc(var(--u) * 0.4); padding: calc(var(--u) * 0.4) calc(var(--u) * 1.2);
      background-color: #444; color: white;
      border: calc(var(--u) * 0.1) solid #777; border-radius: calc(var(--u) * 0.4);
      cursor: pointer; font-size: calc(var(--u) * 1.2); width: 60%;
      font-family: 'DotGothic16', sans-serif;
    }

    #shuppatsu-btn {
      margin-top: calc(var(--u) * 0.8); padding: calc(var(--u) * 1) calc(var(--u) * 2);
      background-color: #bb92d8; color: black;
      font-weight: bold; border: none; border-radius: calc(var(--u) * 0.4);
      cursor: pointer; font-size: calc(var(--u) * 1.5); font-family: 'DotGothic16', sans-serif;
      visibility: hidden; 
      animation: dokun 2s infinite;
    }

    @keyframes shyun {
      0% { opacity: 0; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }
    .ookina-hako, h2, h3, .gazou, .slot, #reset-btn { opacity: 0; animation: shyun 1s forwards; }
    .ookina-hako { animation-delay: 0.5s; }
    h2 { animation-delay: 1s; }
    h3, .gazou, .slot, #reset-btn { animation-delay: 1.5s; }

    @keyframes dokun {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
  </style>
</head>

<body>

  <div id="game-container">
    <button id="mute-btn">🔊</button>

    <div class="ookina-hako">
      <div class="menyu">
        <h2>仲間とボスに挑む</h2>
        <h3>どの4人を選ぶ？</h3>
        
        <div class="chara-field">
          <img src="001yusha.png" class="gazou chara-1" data-id="1">
          <img src="004butoka.png" class="gazou chara-4" data-id="4">
          <img src="008murabito.png" class="gazou chara-8" data-id="8">
          
          <img src="002yume-madoshi.png" class="gazou chara-2" data-id="2">
          <img src="003yujutsushi.png" class="gazou chara-3" data-id="3">
          <img src="007reijutsukai.png" class="gazou chara-7" data-id="7">
          
          <img src="005gin-madoshi.png" class="gazou chara-5" data-id="5">
          <img src="009okishi.png" class="gazou chara-9" data-id="9">
          <img src="011miko.png" class="gazou chara-11" data-id="11">
          
          <img src="006kyujutsushi.png" class="gazou chara-6" data-id="6">
          <img src="010yugekika.png" class="gazou chara-10" data-id="10">
          <img src="013tejinashi.png" class="gazou chara-13" data-id="13">
        </div>
      </div>

      <div class="party-slots">
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <button id="reset-btn">リセット</button>
        <button id="shuppatsu-btn">パーティー結成！</button>
      </div>
    </div>
  </div>

<script src="data.js"></script>

  <script>
    // JSのロジックは一切変更なしでそのまま完全に動作します
    let selectedIds = [];

    const charaList = document.querySelectorAll('.gazou');
    const HakoList = document.querySelectorAll('.slot');
    const resetBtn = document.getElementById('reset-btn');
    const shuppatsuBtn = document.getElementById('shuppatsu-btn');
    const ketteiSE = new Audio('kettei.mp3');
    const kachiSE = new Audio('kachi.mp3');
    const bgm = new Audio('charaBGM.mp3');
    bgm.volume = 0.3;
    const loopStart = 2.6;
    const loopEnd = 26.5;

    bgm.addEventListener('timeupdate', () => {
      if (bgm.currentTime >= loopEnd) { bgm.currentTime = loopStart; }
    });

    function checkParty() {
      let count = 0;
      HakoList.forEach(hako => { if (hako.querySelector('img')) count++; });
      shuppatsuBtn.style.visibility = (count === 4) ? "visible" : "hidden";
    }

    charaList.forEach(chara => {
      chara.addEventListener('click', () => {
        for (let hako of HakoList) {
          if (hako.querySelector('img') === null) {
            kachiSE.currentTime = 0;
            kachiSE.play();

            const cid = parseInt(chara.getAttribute('data-id'));
            selectedIds.push(cid);

            const copyImg = chara.cloneNode();
            copyImg.style.opacity = "1";
            copyImg.style.width = "auto";
            copyImg.style.height = "90%";
            copyImg.style.position = "static"; 
            hako.appendChild(copyImg);
            chara.classList.add('selected');
            checkParty();
            return;
          }
        }
      });
    });

    resetBtn.addEventListener('click', () => {
      HakoList.forEach(hako => { hako.innerHTML = ""; });
      selectedIds = [];
      charaList.forEach(chara => {
        chara.classList.remove('selected');
        chara.style.pointerEvents = "auto";
      });
      checkParty();
    });

    shuppatsuBtn.addEventListener('click', () => {
      ketteiSE.play();
      bgm.pause();
      const myPartyData = selectedIds.map(id => {
        return characterMasterList.find(c => c.id === id);
      });
      localStorage.setItem('myParty', JSON.stringify(myPartyData));
      setTimeout(() => { window.location.href = 'map.html'; }, 1500);
    });

    const muteBtn = document.getElementById('mute-btn');
    let hasStarted = false;
    muteBtn.addEventListener('click', () => {
      if (!hasStarted) {
        bgm.play();
        bgm.muted = false;
        muteBtn.innerText = "🔊";
        muteBtn.style.backgroundColor = "#bb92d8";
        muteBtn.style.color = "black";
        hasStarted = true;
      } else {
        bgm.muted = !bgm.muted;
        muteBtn.innerText = bgm.muted ? "🔇" : "🔊";
        muteBtn.style.opacity = bgm.muted ? "0.5" : "1";
      }
    });
  </script>
</body>
</html>
