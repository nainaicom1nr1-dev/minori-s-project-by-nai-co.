<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    /* 1. 外側の宇宙 */
    body {
      background-color: black;
      margin: 0; padding: 0;
      display: flex; justify-content: center; align-items: center;
      height: 100dvh; overflow: hidden;
    }

    /* 2. 16:9の黄金の箱 */
    #game-container {
      width: 100vw; height:100dvh; max-width:calc(100dvh*16/9); max-height:calc(100vw*9/16); aspect-ratio:16/9;
      position: relative;
      background-image: url('huruikami.png');
      background-size: cover; background-position: center;
      overflow: hidden;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
    }

    #mute-btn {
      position: absolute; top: 1.27cqw; left: 2.96cqw; z-index: 1000;
      background: rgba(0, 0, 0, 0.5); color: white;
      border: 0.08cqw solid #777; border-radius: 50%;
      width: 3.81cqw; height: 3.81cqw; cursor: pointer;
      font-size: 1.69cqw; display: flex; justify-content: center; align-items: center;
      transition: 0.3s;
    }

    /* 3. キャラ選択の大きな箱 */
    .ookina-hako {
      display: flex; justify-content: center; align-items: center;
      gap: 3cqw; padding: 1.5cqw;
      background-color: rgba(0,0,0,0.6); backdrop-filter: blur(0.42cqw);
      border-radius: 1.69cqw; box-shadow: 0 0 0.84cqw rgba(0,0,0,0.8);
      width: 85%; height: 80%;
      box-sizing: border-box;
    }

    .menyu { 
      text-align: center; flex: 2; 
      display: flex; flex-direction: column; justify-content: center; height: 100%;
    }

    /* ★追加：キャラクターたちを綺麗に3列に並べるグリッドコンテナ */
    .chara-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr); /* 横に均等に3列 */
      gap: 0.4cqw;                           /* 画像同士のすきま */
      justify-items: center;                 /* 横方向の中央寄せ */
      align-items: center;                   /* 縦方向の中央寄せ */
      width: 100%;
      max-width: 30cqw;                      /* 広がりすぎないようにストッパー */
      margin: 0 auto;                        /* メニュー内での中央寄せ */
    }
    
    .party-slots { 
      display: flex; flex-direction: column; gap: 0.4cqw; align-items: center; flex: 1;
      justify-content: center; height: 100%;
    }

    /* 文字サイズ */
    h2 { font-size: 1.7cqw; margin: 0.1cqw 0; color: white; font-family: 'DotGothic16', sans-serif; }
    h3 { font-size: 1.1cqw; margin: 0.1cqw 0 0.4cqw 0; color: white; font-family: 'DotGothic16', sans-serif;}

    /* ★キャラクター画像のサイズ調整（横幅100%にしてグリッドの枠に合わせる） */
    img.gazou { width: 100%; max-width: 8.2cqw; height: auto; cursor: pointer; transition: 0.2s; }
    img.gazou:hover { transform: scale(1.1); }

    /* 選択済みキャラ用のスタイル */
    .selected {
      opacity: 0.2 !important;
      pointer-events: none;
      filter: grayscale(80%);
    }

    /* パーティースロット */
    .slot {
      width: 5.3cqw; height: 5.3cqw;
      border: 0.16cqw dashed #777;
      display: flex; align-items: center; justify-content: center;
      background-color: rgba(255,255,255,0.05);
    }

    .slot img { opacity: 1!important; animation: none!important; width: auto; height: 90%; }

    /* リセットボタン */
    #reset-btn {
      margin-top: 0.2cqw; padding: 0.2cqw 1cqw;
      background-color: #444; color: white;
      border: 0.08cqw solid #777; border-radius: 0.42cqw;
      cursor: pointer; font-size: 0.9cqw; width: 70%;
      font-family: 'DotGothic16', sans-serif;
    }

    /* 結成ボタン */
    #shuppatsu-btn {
      margin-top: 0.3cqw; padding: 0.5cqw 1.5cqw;
      background-color: #bb92d8; color: black;
      font-weight: bold; border: none; border-radius: 0.42cqw;
      cursor: pointer; font-size: 1.3cqw; font-family: 'DotGothic16', sans-serif;
      visibility: hidden; 
      animation: dokun 2s infinite;
    }

    @keyframes shyun {
      0% { opacity: 0; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }
    .ookina-hako, h2, h3, .chara-grid, .slot, #reset-btn { opacity: 0; animation: shyun 1s forwards; }
    .ookina-hako { animation-delay: 0.5s; }
    h2 { animation-delay: 1s; }
    h3, .chara-grid, .slot, #reset-btn { animation-delay: 1.5s; }

    @keyframes dokun {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
  </style>
</head>

<body>

  <div id="game-container">
    <button id="mute-btn">🔊</button>

    <div class="ookina-hako">
      <div class="menyu">
        <h2>仲間とボスに挑む</h2>
        <h3>どの4人を選ぶ？</h3>
        
        <div class="chara-grid">
          <img src="001yusha.png" class="gazou" data-id="1">
          <img src="004butoka.png" class="gazou" data-id="4">
          <img src="008murabito.png" class="gazou" data-id="8">
          <img src="002yume-madoshi.png" class="gazou" data-id="2">
          <img src="003yujutsushi.png" class="gazou" data-id="3">
          <img src="007reijutsukai.png" class="gazou" data-id="7">
          <img src="005gin-madoshi.png" class="gazou" data-id="5">
          <img src="009okishi.png" class="gazou" data-id="9">
          <img src="011miko.png" class="gazou" data-id="11">
          <img src="006kyujutsushi.png" class="gazou" data-id="6">
          <img src="010yugekika.png" class="gazou" data-id="10">
          <img src="013tejinashi.png" class="gazou" data-id="13">
        </div>
      </div>

      <div class="party-slots">
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <button id="reset-btn">リセット</button>
        <button id="shuppatsu-btn">パーティー結成！</button>
      </div>
    </div>
  </div>

<script src="data.js"></script>

  <script>
    let selectedIds = [];

    const charaList = document.querySelectorAll('.gazou');
    const HakoList = document.querySelectorAll('.slot');
    const resetBtn = document.getElementById('reset-btn');
    const shuppatsuBtn = document.getElementById('shuppatsu-btn');
    const ketteiSE = new Audio('kettei.mp3');
    const kachiSE = new Audio('kachi.mp3');
    const bgm = new Audio('charaBGM.mp3');
    bgm.volume = 0.3;
    const loopStart = 2.6;
    const loopEnd = 26.5;

    bgm.addEventListener('timeupdate', () => {
      if (bgm.currentTime >= loopEnd) { bgm.currentTime = loopStart; }
    });

    function checkParty() {
      let count = 0;
      HakoList.forEach(hako => { if (hako.querySelector('img')) count++; });
      shuppatsuBtn.style.visibility = (count === 4) ? "visible" : "hidden";
    }

    charaList.forEach(chara => {
      chara.addEventListener('click', () => {
        for (let hako of HakoList) {
          if (hako.querySelector('img') === null) {
            kachiSE.currentTime = 0;
            kachiSE.play();

            const cid = parseInt(chara.getAttribute('data-id'));
            selectedIds.push(cid);

            const copyImg = chara.cloneNode();
            copyImg.style.opacity = "1";
            copyImg.style.width = "auto";
            copyImg.style.height = "90%";
            hako.appendChild(copyImg);
            chara.classList.add('selected');
            checkParty();
            return;
          }
        }
      });
    });

    resetBtn.addEventListener('click', () => {
      HakoList.forEach(hako => { hako.innerHTML = ""; });
      selectedIds = [];
      charaList.forEach(chara => {
        chara.classList.remove('selected');
        chara.style.pointerEvents = "auto";
      });
      checkParty();
    });

    shuppatsuBtn.addEventListener('click', () => {
      ketteiSE.play();
      bgm.pause();

      const myPartyData = selectedIds.map(id => {
        return characterMasterList.find(c => c.id === id);
      });
      localStorage.setItem('myParty', JSON.stringify(myPartyData));

      setTimeout(() => { window.location.href = 'map.html'; }, 1500);
    });

    const muteBtn = document.getElementById('mute-btn');
    let hasStarted = false;
    muteBtn.addEventListener('click', () => {
      if (!hasStarted) {
        bgm.play();
        bgm.muted = false;
        muteBtn.innerText = "🔊";
        muteBtn.style.backgroundColor = "#bb92d8";
        muteBtn.style.color = "black";
        hasStarted = true;
      } else {
        bgm.muted = !bgm.muted;
        muteBtn.innerText = bgm.muted ? "🔇" : "🔊";
        muteBtn.style.opacity = bgm.muted ? "0.5" : "1";
      }
    });
  </script>
</body>
</html>
