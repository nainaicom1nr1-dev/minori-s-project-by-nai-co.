<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    @font-face {
      font-family: 'BOSSFONT';
      src: url('PixelMplus10-Regular.ttf');
    }

    /* 1. 外側の宇宙（全ての画面で共通） */
    body {
      background-color: black;
      margin: 0; padding: 0;
      display: flex;        
      justify-content: center; 
      align-items: center;     
      height: 100dvh; 
      overflow: hidden;
    }

    /* 2. 16:9の黄金の箱（キャラクター選択・Win・Loseと完全に統一） */
    #game-container {
      width: 100vw; height: 100dvh; max-width: calc(100dvh * 16 / 9); max-height: calc(100vw * 9 / 16); aspect-ratio: 16/9;
      position: relative;      
      background-image: url('map.png');
      background-size: cover;
      background-position: center;
      overflow: hidden;
      transition: background 1s;

      /* ★古い transform: scale 処理を全削除！ブラウザが自動で16:9にフィットさせます */
      
      /* ★魔法のカスタム単位（--u）を登録 */
      container-type: inline-size;
      --u: 1cqw; 
    }

    /* 以下、全ての cqw を var(--u) に綺麗に置き換え */

    .hoshi {
      position: absolute;
      color: black; 
      font-size: calc(var(--u) * 29.66); 
      z-index: 100; 
      pointer-events: none;
      transition: transform 0.2s ease-in;
      transform: translate(-50%, -50%);
      transform-origin: center;
    }

    #game-container.dark { 
      background-image: none !important; 
      background-color: black; 
    }

    #game-container.battle {
      background-image: url('murasaki.png') !important;
      background-size: cover;
      background-position: center;
    }

    .boss-img {
      position: absolute;
      top: calc(var(--u) * -14.4);
      left: 50%;
      transform: translateX(-50%);
      width: calc(var(--u) * 67.79);
      height: auto;
      z-index: 50;
      opacity: 0;
      pointer-events: none;
    }

    .boss-img.show {
      opacity: 1;
      animation: bossSlideIn 1.5s ease-out forwards;
    }

    @keyframes bossSlideIn {
      0% { top: calc(var(--u) * -42.37); opacity: 0; }
      100% { top: calc(var(--u) * -14.4); opacity: 1; }
    }

    .msg-window {
      position: absolute;
      bottom: calc(var(--u) * 2.54);
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      height: calc(var(--u) * 11.86);
      background-color: rgba(0, 0, 0, 0.9);
      border: calc(var(--u) * 0.33) solid white;
      border-radius: calc(var(--u) * 0.67);
      z-index: 200;
      padding: calc(var(--u) * 2.11);
      box-sizing: border-box;
      display: none;
    }

    #message-text {
      color: white;
      font-size: calc(var(--u) * 2.71);
      margin: 0;
      font-family: 'DotGothic16', sans-serif;
      white-space: pre-wrap;
      letter-spacing: calc(var(--u) * 0.16);
    }

    /* ぴかーん用（真っ白ボス） */
    .pika-boss {
      position: absolute;
      top: calc(var(--u) * -14.4); 
      left: 50%;
      transform: translateX(-50%) scale(1);
      width: calc(var(--u) * 67.79);
      z-index: 60; 
      opacity: 0;
      pointer-events: none;
    }

    /* 拡大＋薄くなるアニメーション */
    .pika-animation {
      animation: pikaFlash 0.6s ease-out forwards;
    }

    @keyframes pikaFlash {
      0% {
        transform: translateX(-50%) scale(1);
        opacity: 1;
        filter: brightness(2); 
      }
      100% {
        transform: translateX(-50%) scale(1.5); 
        opacity: 0; 
      }
    }

    /* ふわっと消えるための設定 */
    .fade-out {
      opacity: 0 !important;
      transition: opacity 1s ease-out; 
    }

    /* バトル画面用のボス配置 */
    .battle-boss {
      position: absolute;
      left: 25%; 
      top: 45%; 
      transform: translate(-50%, -50%); 
      width: calc(var(--u) * 29.66); 
      height: auto;
      z-index: 100;
      display: none; 
    }

    /* 下部UIをまとめるコンテナ */
    #battle-footer {
      position: absolute;
      bottom: calc(var(--u) * 1.69);
      left: 50%;
      transform: translateX(-50%);
      width: 95%; 
      height: calc(var(--u) * 13.55);
      display: none; 
      justify-content: space-between; 
      z-index: 200;
    }

    /* 共通の黒いボックス設定 */
    .black-box {
      background-color: rgba(0, 0, 0, 0.9);
      border: calc(var(--u) * 0.33) solid white;
      border-radius: calc(var(--u) * 0.67);
      padding: calc(var(--u) * 1.69);
      box-sizing: border-box;
      color: white;
      font-family: 'DotGothic16', sans-serif;
    }

    /* 左：メッセージボックス（幅74%） */
    #battle-msg-box {
      width: 74%;
      font-size: calc(var(--u) * 2.37);
      height: calc(var(--u) * 11.86);
      line-height: 1.5;
    }

    /* 右：コマンドボックス（幅24%） */
    #battle-command-box {
      width: 24%;
      height: calc(var(--u) * 11.86);
      font-size: calc(var(--u) * 2.37);
    }

    /* コマンドのリスト装飾を消す */
    #command-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    #command-list li {
      margin-bottom: calc(var(--u) * 0.84);
      cursor: pointer;
    }

    #item-list li {
      font-size: calc(var(--u) * 1.69);
      line-height: 1.2;  
      margin-bottom: calc(var(--u) * 0.42); 
    }

    /* 画面上部に横一列に並べる */
    #party-status-window {
      position: absolute;
      top: calc(var(--u) * 0.84);
      right: calc(var(--u) * 1.69);
      width: auto;
      display: none; 
      flex-direction: row; 
      justify-content: flex-end;
      gap: calc(var(--u) * 0.42); 
      z-index: 300;
    }

    /* 1人分ずつのボックス */
    .status-row {
      width: calc(var(--u) * 11.86);       
      height: calc(var(--u) * 5.08);       
      background-color: rgba(0, 0, 0, 0.85);
      border: calc(var(--u) * 0.16) solid white;
      border-radius: calc(var(--u) * 0.5);
      padding: calc(var(--u) * 0.33) calc(var(--u) * 0.84);  
      display: flex;
      flex-direction: column;
      justify-content: center; 
      color: white;
      font-family: 'DotGothic16', sans-serif;
    }

    .status-name { 
      font-size: calc(var(--u) * 1.27); 
      margin-bottom: 0; 
    }

    .hp-text { 
      font-size: calc(var(--u) * 0.93); 
      margin-top: calc(var(--u) * -0.16);   
    }

    .shake {
      animation: shake 0.2s ease-in-out 0s 2;
    }

    @keyframes shake {
      0% { margin-left: 0; }
      25% { margin-left: calc(var(--u) * 0.84); }
      50% { margin-left: calc(var(--u) * -0.84); }
      100% { margin-left: 0; }
    }

    /* 味方がダメージを受けた時の揺れ */
    .damage-shake {
      animation: damage-shake 0.3s ease-in-out;
    }

    @keyframes damage-shake {
      0% { transform: translate(-50%, -50%) translateX(0); }
      20% { transform: translate(-50%, -50%) translateX(calc(var(--u) * 2.54)); } 
      40% { transform: translate(-50%, -50%) translateX(calc(var(--u) * -1.69)); }
      60% { transform: translate(-50%, -50%) translateX(calc(var(--u) * 1.84)); }
      100% { transform: translate(-50%, -50%) translateX(0); }
    }

    /* 攻撃時にぴょんぴょん跳ねるアニメーション */
    .attack-hop {
      animation: attack-hop 0.5s ease-out; 
    }

    @keyframes attack-hop {
      0% { transform: translate(-50%, -50%) translateY(0); }
      30% { transform: translate(-50%, -50%) translateY(calc(var(--u) * -3.38)); } 
      60% { transform: translate(-50%, -50%) translateY(0); }
      80% { transform: translate(-50%, -50%) translateY(calc(var(--u) * -0.84)); } 
      100% { transform: translate(-50%, -50%) translateY(0); }
    }

    /* 死亡時の見た目 */
    .dead-chara {
      filter: grayscale(100%) brightness(0.5);
      opacity: 0.6;
      transition: all 0.5s;
      margin-top: calc(var(--u) * 1.69); 
    }
  </style>
</head>

<body>
  <div id="game-container">
    <img src="000majyo.png" id="boss-character" class="boss-img">
    <img src="000majyo_white.png" id="boss-pika" class="pika-boss"> 

    <div id="boss-hp-container" style="position: absolute; top: calc(var(--u) * 33.89); left: 25%; transform: translateX(-50%); width: calc(var(--u) * 16.94); height: calc(var(--u) * 0.84); background: #333; border: calc(var(--u) * 0.16) solid white; display: none; z-index: 110;">
      <div id="boss-hp-bar" style="width: 100%; height: 100%; background: #ff4757; transition: width 0.3s;"></div>
    </div>
      
    <img src="000majyo.png" id="battle-boss-img" class="battle-boss">

    <div id="party-status-window"></div>

    <div id="battle-footer">
      <div id="battle-msg-box" class="black-box">
        <p id="battle-msg-text">ボスは 嫉妬のオーラを 放っている……</p>
      </div>
      
      <div id="battle-command-box" class="black-box" style="display:none;">
        <ul id="command-list">
          <li onclick="selectCommand()"> たたかう</li>
          <li onclick="showItemList()"> アイテム</li>
        </ul>
      </div>

      <div id="item-list-box" class="black-box" style="display:none; width: 24%; height: calc(var(--u) * 11.86); overflow-y: auto;">
        <ul id="item-list" style="list-style: none; margin: 0; padding: 0;"></ul>
      </div>

      <div id="target-window-overlay" style="display:none; position:absolute; top: -45%; left: 82.2%; transform: translate(-50%, -50%); width: calc(var(--u) * 33.89); z-index: 500;">
        <div class="black-box" style="width: 100%; height: auto; min-height: calc(var(--u) * 16.94);">
          <p style="margin-top:0; border-bottom: calc(var(--u) * 0.16) solid white; padding-bottom: calc(var(--u) * 0.84);">だれに つかいますか？</p>
          <ul id="target-list" style="list-style: none; margin: 0; padding: 0; font-size: calc(var(--u) * 2.37);"></ul>
        </div>
      </div>
    </div>

    <div id="message-window" class="msg-window">
      <p id="message-text"></p>
    </div>
  </div>

<script src="skills.js"></script>
<script src="data.js"></script>

<script>
/* --- ① データの読み込み --- */
const savedData = localStorage.getItem('myParty');
const partyMembers = savedData ? JSON.parse(savedData) : [];

if (partyMembers.length === 0) {
  const ids = [1, 2, 3, 4];
  ids.forEach(id => {
    const chara = characterMasterList.find(c => c.id === id);
    if(chara) partyMembers.push(chara);
  });
}

const container = document.getElementById('game-container');
let canAdvance = false; 

function playPika() {
  const pikaSfx = new Audio('pika.mp3');
  pikaSfx.play();
}

function typeMessage(text, element, speed, soundFile) {
  let i = 0;
  element.innerText = "";
  const sfx = new Audio(soundFile);
  sfx.loop = true;
  sfx.play();
  
  const timer = setInterval(() => {
    if (i < text.length) {
      element.innerText += text.charAt(i);
      i++;
    } else {
      clearInterval(timer);
      sfx.pause(); 
      sfx.currentTime = 0; 
      canAdvance = true; 
    }
  }, speed);
}

function createStar(leftPercent, topPercent) {
  const star = document.createElement('div');
  star.className = 'hoshi';
  star.innerText = '★'; 
  star.style.left = leftPercent + '%';
  star.style.top = topPercent + '%';
  container.appendChild(star);
}

// 最初のクリック（演出開始）
window.addEventListener('pointerdown', () => {
  const bgm = new Audio('bossBGM.mp3');
  bgm.volume = 0.3;
  const loopStart = 1.3;
  const loopEnd = 162.6;

  bgm.addEventListener('timeupdate', () => {
    if (bgm.currentTime >= loopEnd) {
      bgm.currentTime = loopStart;
    }
  });
  bgm.play();

  setTimeout(() => {
    createStar(50, 70); 
    setTimeout(() => { createStar(65, 70); createStar(35, 70); createStar(50, 40); }, 100);
    setTimeout(() => { createStar(80, 70); createStar(20, 70); createStar(50, 10); createStar(50, 100); createStar(65, 40); createStar(35, 40); }, 200);
    setTimeout(() => { createStar(95, 70); createStar(5, 70); createStar(80, 40); createStar(20, 40); createStar(65, 10); createStar(35, 10); createStar(65, 100); createStar(35, 100); }, 300);
    setTimeout(() => { createStar(95, 40); createStar(5, 40); createStar(80, 10); createStar(20, 10); createStar(80, 100); createStar(20, 100); }, 400);
    setTimeout(() => { createStar(95, 10); createStar(5, 10); createStar(95, 100); createStar(5, 100); }, 500);

    setTimeout(() => {
      document.querySelectorAll('.hoshi').forEach(star => { star.style.transform = 'translate(-50%, -50%) scale(2)'; });
    }, 700);

    setTimeout(() => {
      document.querySelectorAll('.hoshi').forEach(star => star.remove());
      container.classList.add('dark'); 

      setTimeout(() => {
        const boss = document.getElementById('boss-character');
        const pika = document.getElementById('boss-pika'); 

        boss.classList.add('show'); 
        
        setTimeout(() => {
          playPika(); 
          pika.classList.add('pika-animation');
        }, 1500);
        const msgWindow = document.getElementById('message-window');
        const msgText = document.getElementById('message-text');

        boss.classList.add('show'); 
        container.classList.remove('dark');
        container.classList.add('battle');

        msgWindow.style.display = 'block';
        typeMessage('そんざいしない ボスが あらわれた！', msgText, 50, 'moji.mp3');

      }, 2000);
    }, 2000);
  }, 500); 
}, { once: true });

// 2回目以降のクリック
window.addEventListener('pointerdown', () => {
  if (!canAdvance) return;
  canAdvance = false;

  const ketteiSfx = new Audio('kettei.mp3');
  ketteiSfx.volume = 1;
  ketteiSfx.play();

  setTimeout(() => {
    const boss = document.getElementById('boss-character');
    const msgWindow = document.getElementById('message-window');

    container.classList.remove('battle');
    container.classList.add('dark'); 
    boss.classList.add('fade-out');

    setTimeout(() => {
      msgWindow.style.display = 'none';
    }, 500);

    setTimeout(() => {
      container.style.transition = "none";
      container.classList.remove('dark');
      container.style.backgroundImage = "url('battlemap.png')";
      
      boss.style.display = 'none'; 

      setTimeout(() => {
        const battleBoss = document.getElementById('battle-boss-img');
        battleBoss.style.display = 'block'; 

        const footer = document.getElementById('battle-footer');
        footer.style.display = 'flex'; 

        setupBattlefield();
        console.log("バトル画面完成！");
      }, 500);  

      setTimeout(() => {
          container.style.transition = "background 1s ease-out";
      }, 100);
    }, 1500); 

  }, 1000); 
});

// --- ② 仲間とステータスを生成する関数 ---
function setupBattlefield() {
  const statusWindow = document.getElementById('party-status-window');
  statusWindow.innerHTML = ""; 
  statusWindow.style.display = "flex"; 

  partyMembers.forEach((member, index) => {
    member.selectedAction = "attack"; 

    // 1. キャラクター画像の配置（インラインの cqw を var(--u) に置き換え）
    const img = document.createElement('img');
    img.src = member.img;
    img.id = `chara-img-${index}`; 
    img.style.position = 'absolute';
    img.style.width = 'calc(var(--u) * 15.25)';
    img.style.zIndex = (150-index).toString();
    const coords = [
      { left: '53%', top: '58%' },
      { left: '73%', top: '59%' },
      { left: '64%', top: '37%' },
      { left: '83%', top: '38%' }
    ];
    img.style.left = coords[index].left;
    img.style.top = coords[index].top;
    img.style.transform = 'translate(-50%, -50%)';
    container.appendChild(img);
    
    // 2. 上部に横並びするステータス行（インラインの cqw を var(--u) に置き換え）
    const row = document.createElement('div');
    row.className = 'status-row'; 
    row.innerHTML = `
      <div class="status-name">${member.name}</div>
      <div class="hp-text">HP: <span id="hp-val-${index}">${member.hp}</span> / ${member.maxHp}</div>
      <div class="hp-bar-bg" style="width:100%; height:calc(var(--u) * 0.67); background:#555; border-radius:calc(var(--u) * 0.33); overflow:hidden;">
        <div class="hp-bar-fill" id="hp-bar-${index}" style="width:100%; height:100%; background:linear-gradient(to right, #2ecc71, #27ae60); transition: width 0.5s;"></div>
      </div>
    `;
    statusWindow.appendChild(row);

    document.getElementById('boss-hp-container').style.display = 'block';
    document.getElementById('battle-command-box').style.display = 'none';

    setBattleMessage("ボスは 嫉妬のオーラを 放っている……");

    const startBattleTrigger = () => {
       checkAndShowCommand(); 
      window.removeEventListener('pointerdown', startBattleTrigger);
    };
    window.addEventListener('pointerdown', startBattleTrigger);
  });
}

/* --- ③ バトルの実行ロジック --- */
let bossData = characterMasterList.find(c => c.id === 0);
let currentInputIndex = 0; 
let isInputPhase = true;   

function setBattleMessage(text) {
  const msgEl = document.getElementById('battle-msg-text');
  msgEl.innerText = text;
}

const seKettei = new Audio('kettei.mp3');

function showItemList() {
  if (!isInputPhase || partyMembers[currentInputIndex].hp <= 0) return; 
  seKettei.currentTime = 0;
  seKettei.play();
  
  const member = partyMembers[currentInputIndex];
  const itemListEl = document.getElementById('item-list');
  const commandBox = document.getElementById('battle-command-box');
  const itemBox = document.getElementById('item-list-box');

  itemListEl.innerHTML = "";

  member.items.forEach((item, index) => {
    const li = document.createElement('li');
    if (item.count > 0) {
      li.innerText = `${item.name} (${item.count})`;
      li.style.cursor = "pointer";
      li.onclick = () => useItem(index);
    } else {
      li.innerText = `${item.name} (0)`;
      li.style.color = "#888";
    }
    itemListEl.appendChild(li);
  });

  const backLi = document.createElement('li');
  backLi.innerText = "▶︎もどる";
  backLi.style.marginTop = "calc(var(--u) * 0.84)";
  backLi.onclick = () => {
    itemBox.style.display = 'none';
    commandBox.style.display = 'block';
  };
  itemListEl.appendChild(backLi);

  commandBox.style.display = 'none';
  itemBox.style.display = 'block';
}

let selectedItemIndex = null; 
function useItem(itemIndex) {
  const member = partyMembers[currentInputIndex];
  const item = member.items[itemIndex];

  seKettei.currentTime = 0;
  seKettei.play();

  selectedItemIndex = itemIndex;

  if (item.effect === "heal_target") {
    showTargetList();
  } else {
    document.getElementById('item-list-box').style.display = 'none';
    executeItemEffect(currentInputIndex);
  }
}

function showTargetList() {
  document.getElementById('item-list-box').style.display = 'none';
  
  const targetOverlay = document.getElementById('target-window-overlay');
  const targetListEl = document.getElementById('target-list');

  targetListEl.innerHTML = "";
  targetOverlay.style.display = 'block';

  partyMembers.forEach((m, index) => {
    if (m.hp > 0) {
      const li = document.createElement('li');
      li.style.padding = "calc(var(--u) * 0.84) 0";
      li.style.cursor = "pointer";
      li.innerHTML = `  ${m.name} <span style="font-size:calc(var(--u) * 1.52);">(HP:${m.hp})</span>`;
      li.onclick = () => executeItemEffect(index);
      targetListEl.appendChild(li);
    }
  });

  const backLi = document.createElement('li');
  backLi.innerText = "▶︎ もどる";
  backLi.style.marginTop = "calc(var(--u) * 1.27)";
  backLi.style.color = "#aaa";
  backLi.onclick = () => {
    targetOverlay.style.display = 'none';
    document.getElementById('item-list-box').style.display = 'block'; 
  };
  targetListEl.appendChild(backLi);
}

function executeItemEffect(targetIndex) {
  const member = partyMembers[currentInputIndex];
  const target = partyMembers[targetIndex];
  const item = member.items[selectedItemIndex];

  seKettei.currentTime = 0;
  seKettei.play();

  document.getElementById('target-window-overlay').style.display = 'none';
  document.getElementById('item-list-box').style.display = 'none';
  document.getElementById('battle-command-box').style.display = 'none';

  item.count--;
  member.selectedAction = "item";

  let effectMsg = "";
  if (item.effect === "heal_target" || item.effect === "heal_fixed") {
    applyHeal(target, item.value);
    effectMsg = `${member.name}は ${item.name}を ${target.name}に使った！`;
  } else if (item.effect === "heal_full") {
    applyHeal(target, (target.maxHp - target.hp));
    effectMsg = `${member.name}は ${item.name}で ${target.name}を全回復させた！`;
  }

  setBattleMessage(effectMsg);
  updateStatusUI(targetIndex);

  setTimeout(() => {
    proceedNextTurn();
  }, 1000);
}

function selectCommand() {
  if (!isInputPhase) return;
  
  seKettei.currentTime = 0;
  seKettei.play();

  partyMembers[currentInputIndex].selectedAction = "attack";
  proceedNextTurn();
}

function checkAndShowCommand() {
  document.getElementById('battle-command-box').style.display = 'none';
  document.getElementById('item-list-box').style.display = 'none';
  document.getElementById('target-window-overlay').style.display = 'none';
  if (currentInputIndex < partyMembers.length) {
    const member = partyMembers[currentInputIndex];
    
    if (member.hp <= 0) {
      currentInputIndex++;
      checkAndShowCommand();
    } else {
      document.getElementById('battle-command-box').style.display = 'block';
      setBattleMessage(`${member.name} は どうする？`);
    }
  } else {
    isInputPhase = false;
    executeFullTurn();
  }
}

function proceedNextTurn() {
  currentInputIndex++;
  checkAndShowCommand();
}

function applyHeal(target, amount, skipEcho = false) {
  if (!target || target.hp <= 0) return;

  const oldHp = target.hp;
  target.hp = Math.min(target.maxHp, target.hp + amount);
  const actualHeal = target.hp - oldHp;

  updateStatusUI(partyMembers.indexOf(target));

  if (!skipEcho && target.passiveSkill === "archer_kindness_echo" && actualHeal > 0) {
    setBattleMessage(`${target.name}は、みんなに お返しをした！`);
    
    partyMembers.forEach((member, i) => {
      if (member.id !== target.id && member.hp > 0) {
        applyHeal(member, amount, true); 
      }
    });
  }
}

function executeFullTurn() {
  setBattleMessage("パーティーの 攻撃！");
  let extraAttacker = null; 

  partyMembers.forEach((member, index) => {
    setTimeout(() => {
      if (member.hp <= 0) {
        if (member.passiveSkill === "beast_tamer_auto_attack") {
          const survivors = partyMembers.filter(m => m.id !== member.id && m.hp > 0);
          if (survivors.length > 0) {
            bossData.hp -= 5;
            setBattleMessage(`${member.name}の霊獣が 5 のダメージを与えた！`);
            updateBossHPBar();
            shakeBoss();
          }
        }
        return;
      }

      if (member.selectedAction === "item") return; 

      const attackerImg = document.getElementById(`chara-img-${index}`);
      if (attackerImg) {
          attackerImg.classList.add('attack-hop');
          setTimeout(() => {
              attackerImg.classList.remove('attack-hop');
          }, 500); 
      }

      const hitRoll = Math.floor(Math.random() * 100) + 1;
      if (hitRoll > member.hit) {
        setBattleMessage(`${member.name}の攻撃は、当たらなかった！`);
        return;
      }

      let currentAtk = (member.attribute === "魔法") ? member.matk : member.atk;
      const magician = partyMembers.find(m => m.passiveSkill === "magician_mixed_trick" && m.hp > 0);
      if (magician && member.id !== magician.id) {
        currentAtk = member.atk + member.matk;
      }
      if (member.passiveSkill === "villager_genki_power" && member.hp >= (member.maxHp / 2)) {
        currentAtk = Math.floor(currentAtk * 2.5);
      }

      let damageMultiplier = 1;
      let healAfterAttack = false;
      if (member.passiveSkill === "butoka_last_resort" && member.hp <= (member.maxHp / 4)) {
        damageMultiplier = 3;
        healAfterAttack = true;
        setBattleMessage(`よく はたらく${member.name}！`);
      }

      const critRoll = Math.floor(Math.random() * 100) + 1;
      const isCritical = critRoll <= member.crit;
      if (isCritical && member.passiveSkill === "guerrilla_extra_turn") {
        extraAttacker = member;
      }

      const targetDef = (member.attribute === "魔法") ? bossData.mdef : bossData.def;
      const luck = Math.floor(Math.random() * 11) - 5;
      let damage = Math.floor(((currentAtk - (targetDef / 2)) * (isCritical ? 2 : 1) + luck) * damageMultiplier);
      damage = Math.max(1, damage);

      bossData.hp -= damage;
      updateBossHPBar();
      shakeBoss();
      setBattleMessage(`${isCritical ? '気合いたっぷり！' : ''}${member.name}は、魔女に ${damage} のダメージ！`);

      if (healAfterAttack) {
        setTimeout(() => {
          member.hp = member.maxHp;
          setBattleMessage(`${member.name}は 社長の力を借りた！`);
          updateStatusUI(index);
        }, 500);
      }
      executeHealSkills(member);

      if (bossData.hp <= 0) {
        setBattleMessage("魔女に勝利した！");
        document.getElementById('battle-boss-img').classList.add('fade-out');
        canAdvanceNextMap = "win"; 
        return; 
      }
    }, index * 1000);
  });

  const delayForExtra = partyMembers.length * 1000;
  setTimeout(() => {
    if (extraAttacker && extraAttacker.hp > 0 && bossData.hp > 0) {
      const damage = 10;
      bossData.hp -= damage;
      setBattleMessage(`${extraAttacker.name}のおかわり！ ${damage} のダメージ！`);
      updateBossHPBar();
      shakeBoss();
    }
  }, delayForExtra);

  const delayForWitch = delayForExtra + (extraAttacker ? 1500 : 500);
  setTimeout(() => {
    if (bossData.hp <= 0) return;
    witchAction();
  }, delayForWitch);
}

function updateBossHPBar() {
  const percent = (bossData.hp / bossData.maxHp) * 100;
  document.getElementById('boss-hp-bar').style.width = Math.max(0, percent) + "%";
}

function shakeBoss() {
  const bossImg = document.getElementById('battle-boss-img');
  bossImg.classList.add('shake');
  setTimeout(() => bossImg.classList.remove('shake'), 200);
}

function executeHealSkills(member) {
  if (member.passiveSkill === "hero_heals_all") {
    partyMembers.forEach((m, i) => { if (m.id !== member.id && m.hp > 0) applyHeal(m,5); });
  }
  if (member.passiveSkill === "silver_share_kindness" && member.hp <= (member.maxHp / 2) && member.hp > 0) {
    setBattleMessage(`${member.name}は お裾分けをした！ 全員のHPが 10 回復！`);
    partyMembers.forEach((m) => applyHeal(m,10));
  }
  if ((member.passiveSkill === "healer_single_care" || member.passiveSkill === "miko_sacred_healing") && member.hp > 0) {
    const wounded = partyMembers.filter(m => m.hp > 0).reduce((prev, curr) => (prev.hp < curr.hp) ? prev : curr);
    if (wounded) applyHeal(wounded,20)
  }
}

function witchAction() {
  const aliveMembers = partyMembers.filter(m => m.hp > 0);
  const skillEffect = passiveSkills["witch_love_drain"].execute(bossData, partyMembers);
  
  if (skillEffect && skillEffect.heal > 0) {
    setBattleMessage(`魔女は親愛を感じている… HPが ${skillEffect.heal} 回復した！`);
    updateBossHPBar();
    setTimeout(witchAttack, 1000); 
  } else {
    witchAttack();
  }

  function witchAttack() {
    if (aliveMembers.length > 0) {
      const target = aliveMembers[Math.floor(Math.random() * aliveMembers.length)];
      const targetIndex = partyMembers.indexOf(target);
      let def = target.def;
      let mdef = target.mdef;
      if (target.passiveSkill === "royal_knight_guardian" && partyMembers.some(m => m.id !== target.id && m.attribute === "魔法" && m.hp > 0)) {
        def += 30; mdef += 30;
      }
      let damage = Math.max(1, bossData.matk - mdef);
      if (target.passiveSkill === "yume_fujoshi_barrier" && partyMembers.filter(m => m.sex === "男" && m.hp > 0).length >= 2) damage = 0;

      const targetImg = document.getElementById(`chara-img-${targetIndex}`);
      if (targetImg && damage > 0) {
        targetImg.classList.add('damage-shake');
        setTimeout(() => targetImg.classList.remove('damage-shake'), 300);
      }
      target.hp -= damage;
      setBattleMessage(`魔女の 愛の火力！ ${target.name}に ${damage} のダメージ！`);
      updateStatusUI(targetIndex);
    }

    setTimeout(() => {
      if (!partyMembers.some(m => m.hp > 0)) {
        setBattleMessage("パーティーは 全滅してしまった…");
        canAdvanceNextMap = "lose";
      } else {
        isInputPhase = true;
        currentInputIndex = 0;
        partyMembers.forEach(m => m.selectedAction = "attack");
        checkAndShowCommand();
      }
    }, 1000);
  }
}

function updateStatusUI(index) {
    const member = partyMembers[index];
    const hpVal = document.getElementById(`hp-val-${index}`);
    const hpBar = document.getElementById(`hp-bar-${index}`);
    const targetImg = document.getElementById(`chara-img-${index}`);
    
    if (hpVal) hpVal.innerText = Math.max(0, member.hp);
    if (hpBar) {
        const percent = Math.max(0, (member.hp / member.maxHp) * 100);
        hpBar.style.width = percent + "%";
        if (percent <= 0) hpBar.style.background = "#333";
        else if (percent < 25) hpBar.style.background = "linear-gradient(to right, #e74c3c, #c0392b)";
        else if (percent < 50) hpBar.style.background = "linear-gradient(to right, #f1c40f, #f39c12)";
        else hpBar.style.background = "linear-gradient(to right, #2ecc71, #27ae60)";
    }
    if (member.hp <= 0 && targetImg) targetImg.classList.add('dead-chara');
    else if (targetImg) targetImg.classList.remove('dead-chara');
}

let canAdvanceNextMap = null;

window.addEventListener('pointerdown', () => {
    if (canAdvanceNextMap === "win") {
        window.location.href = 'win.html'; 
    } else if (canAdvanceNextMap === "lose") {
        window.location.href = 'lose.html'; 
    }
});
  </script>
