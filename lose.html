<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    /* 1. 外側の宇宙（全ての画面で共通） */
    body {
      background-color: black;
      margin: 0; padding: 0;
      display: flex; justify-content: center; align-items: center;
      height: 100dvh; overflow: hidden;
    }
    
    /* 2. 16:9の黄金の箱（他の画面と完全に統一） */
    #game-container {
      width: 100vw; height: 100dvh; max-width: calc(100dvh * 16 / 9); max-height: calc(100vw * 9 / 16); aspect-ratio: 16/9;
      position: relative;
      background-color: #333; /* 予備色 */
      background-image: url('huruikami.png');
      filter: grayscale(50%); /* 元のモノクロ演出をキープ */
      background-size: cover; background-position: center;
      overflow: hidden;
      
      display: flex; 
      flex-direction: column; 
      justify-content: center; /* これで中の要素を縦方向の真ん中に配置 */
      align-items: center;    /* これで中の要素を横方向の真ん中に配置 */
      
      /* ★魔法のカスタム単位（--u）を登録 */
      container-type: inline-size;
      --u: 1cqw; 
    }

    /* 画像の上に赤色を被せるエフェクト */
    #game-container::before {
      content: "";
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-color: rgba(100, 0, 0, 0.4); /* 赤色の透明フィルター */
      z-index: 1; /* ★背景画像(デフォルト)の上に重ねる */
    }

    /* 3. 「YOU LOSE...」の文字装飾 */
    h1 {
      color: red;
      font-family: 'DotGothic16', sans-serif;
      text-align: center;
      
      /* 前回の cqw 指定を var(--u) に置き換え */
      font-size: calc(var(--u) * 8.5);
      text-shadow: 0 0 calc(var(--u) * 1.7) white;
      
      margin: 0; /* margin-top: 25% を廃止し、ブレを防止 */
      position: relative;
      z-index: 2; /* 赤い背景フィルター(z-index: 1)よりも手前に表示 */
      
      opacity: 0;
      animation: shyun 1s forwards;
    }

    @keyframes shyun {
      0% { opacity: 0; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>

  <div id="game-container">
    <h1>YOU LOSE...</h1>
  </div>

</body>
</html>
